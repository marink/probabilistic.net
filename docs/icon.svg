<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <marker id="arr" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto">
      <path d="M0,0 L0,5 L5,2.5 Z" fill="rgba(255,255,255,0.65)"/>
    </marker>
  </defs>
  <rect width="32" height="32" rx="7" fill="#6A1B9A"/>
  <!-- A → B -->
  <line x1="13" y1="9" x2="20" y2="9"
        stroke="rgba(255,255,255,0.55)" stroke-width="1.4" marker-end="url(#arr)"/>
  <!-- A → C -->
  <line x1="9"  y1="13" x2="14" y2="21"
        stroke="rgba(255,255,255,0.55)" stroke-width="1.4" marker-end="url(#arr)"/>
  <!-- B → C -->
  <line x1="23" y1="13" x2="18" y2="21"
        stroke="rgba(255,255,255,0.55)" stroke-width="1.4" marker-end="url(#arr)"/>
  <!-- nodes -->
  <circle cx="9"  cy="9"  r="3.5" fill="white"/>
  <circle cx="23" cy="9"  r="3.5" fill="#CE93D8"/>
  <circle cx="16" cy="25" r="3.5" fill="#AB47BC"/>
</svg>
